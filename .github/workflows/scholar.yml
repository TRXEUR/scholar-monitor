name: Scholar data ophalen

on:
  schedule:
    # Dagelijks 07:00 Amsterdam-tijd (05:00 UTC zomer / 06:00 UTC winter)
    - cron: '0 5 * * *'
  workflow_dispatch:   # ook handmatig te starten via GitHub → Actions-tab

permissions:
  contents: write      # nodig om scholar_data.json terug te committen

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: scholarly installeren
        run: pip install -r requirements.txt

      - name: Scholar data ophalen
        run: python scholar_fetch.py

      - name: JSON committen naar repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scholar_data.json
          # Alleen committen als er iets veranderd is
          git diff --staged --quiet || git commit -m "Scholar data: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
